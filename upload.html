<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fotoğraf Yükle – Viki Anıtları Seviyor</title>
<link rel="stylesheet" href="css/style.css"/>
<style>
/* Upload sayfası özgün stilleri */
.upload-page { max-width: 960px; margin: 0 auto; padding: 24px 16px; }

.monument-card {
  display: flex;
  gap: 0;
  border: 1px solid #ccc;
  border-radius: 3px;
  overflow: hidden;
  background: #fff;
  margin-bottom: 20px;
}

.monument-img {
  width: 280px;
  min-height: 220px;
  background: #e8e8e8;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.monument-img img { width: 100%; height: 100%; object-fit: cover; }
.monument-img .no-img {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  color: #aaa;
  font-size: 13px;
}
.no-img-icon { font-size: 48px; opacity: .4; }

.monument-info {
  flex: 1;
  padding: 20px 24px;
  border-left: 3px solid #7ebc6f;
}

.monument-title {
  font-size: 26px;
  font-weight: 700;
  color: #333;
  margin-bottom: 6px;
  line-height: 1.2;
}

.monument-location {
  font-size: 14px;
  color: #666;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px 24px;
}

.info-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  font-size: 13px;
}
.info-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; color: #888; }
.info-content { display: flex; flex-direction: column; gap: 2px; }
.info-label { font-size: 11px; color: #999; }
.info-value { color: #333; }
.info-value a { color: #7c2020; text-decoration: none; font-weight: 600; }
.info-value a:hover { text-decoration: underline; }
.info-missing { color: #bbb; font-style: italic; }

/* WLM uyarı bandı */
.wlm-notice {
  border-left: 4px solid #c00;
  background: #fdf2f2;
  padding: 12px 16px;
  margin-bottom: 20px;
  font-size: 13px;
  color: #555;
  border-radius: 0 3px 3px 0;
}
.wlm-notice strong { color: #333; display: block; margin-bottom: 3px; }

/* Upload alanı */
.upload-section {
  border: 1px solid #ccc;
  border-radius: 3px;
  background: #fff;
  overflow: hidden;
}

.upload-section-header {
  background: #f4f4f4;
  border-bottom: 1px solid #ddd;
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 700;
  color: #333;
}

.upload-dropzone {
  padding: 40px 24px;
  text-align: center;
  border: 2px dashed #ccc;
  margin: 16px;
  border-radius: 3px;
  background: #fafafa;
  cursor: pointer;
  transition: border-color .15s, background .15s;
}
.upload-dropzone:hover { border-color: #7ebc6f; background: #f4fbf2; }
.upload-dropzone input[type=file] { display: none; }
.dropzone-icon { font-size: 36px; margin-bottom: 10px; opacity: .5; }
.dropzone-text { font-size: 14px; color: #666; margin-bottom: 6px; }
.dropzone-sub  { font-size: 12px; color: #aaa; }

.upload-form-fields {
  padding: 0 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.field-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: #555;
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: .3px;
}

.field-group input,
.field-group textarea,
.field-group select {
  width: 100%;
  border: 1px solid #ccc;
  border-radius: 3px;
  padding: 7px 10px;
  font-size: 13px;
  font-family: inherit;
  color: #333;
  background: #fff;
  outline: none;
  transition: border-color .15s;
}
.field-group input:focus,
.field-group textarea:focus { border-color: #7ebc6f; }
.field-group textarea { resize: vertical; min-height: 80px; }

.auth-notice {
  background: #fffbea;
  border: 1px solid #e8d96a;
  border-radius: 3px;
  padding: 10px 14px;
  font-size: 12px;
  color: #666;
  margin: 0 16px 16px;
}
.auth-notice a { color: #375f8a; }

.upload-submit {
  display: flex;
  gap: 10px;
  padding: 0 16px 16px;
}
.btn-primary {
  background: #7ebc6f;
  color: #fff;
  border: none;
  border-radius: 3px;
  padding: 8px 20px;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: background .15s;
  opacity: .5;
  cursor: not-allowed;
}
.btn-secondary {
  background: #fff;
  color: #555;
  border: 1px solid #ccc;
  border-radius: 3px;
  padding: 8px 16px;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  transition: background .15s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
}
.btn-secondary:hover { background: #f0f0f0; }

/* Loading */
.loading-state { padding: 60px; text-align: center; color: #999; font-size: 14px; }
.load-spin { width: 28px; height: 28px; border: 2px solid #ddd; border-top-color: #7ebc6f; border-radius: 50%; animation: sp .7s linear infinite; margin: 0 auto 12px; }
@keyframes sp { to { transform: rotate(360deg); } }

/* Responsive */
@media (max-width: 600px) {
  .monument-card { flex-direction: column; }
  .monument-img  { width: 100%; min-height: 160px; }
  .info-grid     { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="header">
  <h1 onclick="history.back()" style="cursor:pointer">
    <span class="logo-green">🏛️</span> Viki Anıtları Seviyor
    <span style="color:#888;font-weight:400;font-size:12px;margin-left:8px">← Haritaya dön</span>
  </h1>
</div>

<div class="upload-page">
  <div id="content">
    <div class="loading-state">
      <div class="load-spin"></div>
      Öğe bilgileri yükleniyor...
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const qid    = params.get('qid');

async function loadItem() {
  if (!qid) { showError('QID bulunamadı.'); return; }

  try {
    const resp   = await fetch(`https://www.wikidata.org/wiki/Special:EntityData/${qid}.json`);
    const data   = await resp.json();
    const entity = data.entities[qid];
    if (!entity) { showError('Öğe bulunamadı.'); return; }

    const label   = entity.labels?.tr?.value || entity.labels?.en?.value || qid;
    const p373    = entity.claims?.P373?.[0]?.mainsnak?.datavalue?.value || null;
    const p18val  = entity.claims?.P18?.[0]?.mainsnak?.datavalue?.value || null;
    const p18url  = p18val
      ? 'https://commons.wikimedia.org/wiki/Special:FilePath/' + encodeURIComponent(p18val) + '?width=280'
      : null;

    // Konum: P131 değerlerinden en yakın olanı al (ilçe, il, ülke)
    const p131ids = (entity.claims?.P131 || []).map(c => c.mainsnak?.datavalue?.value?.id).filter(Boolean);
    let locationStr = '';
    if (p131ids.length) {
      try {
        const locResp = await fetch(
          `https://www.wikidata.org/w/api.php?action=wbgetentities&ids=${p131ids.slice(0,2).join('|')}&props=labels&languages=tr|en&format=json&origin=*`
        );
        const locData = await locResp.json();
        locationStr = p131ids.slice(0,2)
          .map(id => locData.entities?.[id]?.labels?.tr?.value || locData.entities?.[id]?.labels?.en?.value || '')
          .filter(Boolean)
          .join(' · ');
      } catch(e) {}
    }

    // P11729 Kültür Envanteri ID
    const p11729 = entity.claims?.P11729?.[0]?.mainsnak?.datavalue?.value || null;

    // Wikipedia
    const wpTr = entity.sitelinks?.trwiki?.title || null;

    // Resmi web sitesi
    const p856  = entity.claims?.P856?.[0]?.mainsnak?.datavalue?.value || null;

    renderPage({ qid, label, p373, p18url, locationStr, p11729, wpTr, p856 });
  } catch(e) {
    showError('Wikidata verisi alınamadı: ' + e.message);
  }
}

function renderPage(d) {
  document.title = `${d.label} – Fotoğraf Yükle`;

  const imgBlock = d.p18url
    ? `<img src="${d.p18url}" alt="${d.label}" loading="lazy">`
    : `<div class="no-img"><div class="no-img-icon">📷</div><div>Henüz fotoğraf yok</div></div>`;

  const catVal  = d.p373
    ? `<a href="https://commons.wikimedia.org/wiki/Category:${encodeURIComponent(d.p373)}" target="_blank">${d.p373}</a>`
    : `<span class="info-missing">Commons kategorisi yok</span>`;

  const wpVal   = d.wpTr
    ? `<a href="https://tr.wikipedia.org/wiki/${encodeURIComponent(d.wpTr)}" target="_blank">${d.wpTr}</a>`
    : `<span class="info-missing">Wikipedia makalesi yok</span>`;

  const siteVal = d.p856
    ? `<a href="${d.p856}" target="_blank">${d.p856.replace(/^https?:\/\//, '').split('/')[0]}</a>`
    : `<span class="info-missing">Resmi web sitesi yok</span>`;

  const wdVal   = `<a href="https://www.wikidata.org/wiki/${d.qid}" target="_blank">Wikidata girdisi</a>
    <br><small style="color:#888">${d.qid}</small>`;

  const envVal  = d.p11729
    ? `<a href="#" target="_blank">Kültür Envanteri</a><br><small style="color:#888">ID ${d.p11729}</small>`
    : `<span class="info-missing">Kültür Envanteri ID'si yok</span>`;

  const defaultCat = d.p373 ? `[[Category:${d.p373}]]` : '';
  const defaultDesc = `{{tr|${d.label}}}`;

  document.getElementById('content').innerHTML = `

    <div class="monument-card">
      <div class="monument-img">${imgBlock}</div>
      <div class="monument-info">
        <div class="monument-title">${d.label}</div>
        ${d.locationStr ? `<div class="monument-location">🏛 ${d.locationStr} · Türkiye</div>` : ''}
        <div class="info-grid">
          <div class="info-item">
            <div class="info-icon">🖼</div>
            <div class="info-content">
              <div class="info-label">Commons Kategorisi</div>
              <div class="info-value">${catVal}</div>
            </div>
          </div>
          <div class="info-item">
            <div class="info-icon">📄</div>
            <div class="info-content">
              <div class="info-label">Wikipedia</div>
              <div class="info-value">${wpVal}</div>
            </div>
          </div>
          <div class="info-item">
            <div class="info-icon">🔗</div>
            <div class="info-content">
              <div class="info-label">Wikidata</div>
              <div class="info-value">${wdVal}</div>
            </div>
          </div>
          <div class="info-item">
            <div class="info-icon">🌐</div>
            <div class="info-content">
              <div class="info-label">Resmi Site</div>
              <div class="info-value">${siteVal}</div>
            </div>
          </div>
          <div class="info-item">
            <div class="info-icon">🏛</div>
            <div class="info-content">
              <div class="info-label">Kültür Envanteri</div>
              <div class="info-value">${envVal}</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="wlm-notice">
      <strong>Wiki Loves Monuments – Türkiye</strong>
      Fotoğrafınızı yükleyerek bu kültürel mirasın belgelenmesine katkı sağlayabilirsiniz.
      Yükleme için Wikimedia hesabınızla giriş yapmanız gerekecektir.
    </div>

    <div class="upload-section">
      <div class="upload-section-header">📤 Fotoğraf Yükle</div>

      <div class="upload-dropzone" onclick="document.getElementById('file-input').click()">
        <input type="file" id="file-input" accept="image/*" onchange="handleFile(this)">
        <div class="dropzone-icon">📁</div>
        <div class="dropzone-text">Fotoğraf seçmek için tıklayın veya sürükleyin</div>
        <div class="dropzone-sub">JPG, PNG, TIFF · Maksimum 100 MB</div>
      </div>

      <div class="upload-form-fields">
        <div class="field-group">
          <label>Dosya adı</label>
          <input type="text" id="f-filename" placeholder="${d.label} - (açıklama).jpg">
        </div>
        <div class="field-group">
          <label>Açıklama</label>
          <textarea id="f-desc" placeholder="${defaultDesc}">${defaultDesc}</textarea>
        </div>
        <div class="field-group">
          <label>Kategoriler</label>
          <textarea id="f-cats" rows="2">${defaultCat}</textarea>
        </div>
        <div class="field-group">
          <label>Lisans</label>
          <select id="f-license">
            <option value="cc-by-sa-4.0">CC BY-SA 4.0 (önerilen)</option>
            <option value="cc-by-4.0">CC BY 4.0</option>
            <option value="cc0">CC0 (kamu malı)</option>
          </select>
        </div>
      </div>

      <div class="auth-notice">
        ⚠️ Yüklemek için <a href="https://commons.wikimedia.org/w/index.php?title=Special:UserLogin" target="_blank">Wikimedia hesabınızla giriş yapmanız</a> gerekiyor.
        Giriş ve OAuth entegrasyonu yakında eklenecek.
      </div>

      <div class="upload-submit">
        <button class="btn-primary" disabled title="Giriş yapmanız gerekiyor">Yükle (giriş gerekli)</button>
        <a class="btn-secondary"
           href="https://commons.wikimedia.org/wiki/Special:UploadWizard?campaign=wlm-tr${d.p373 ? '&categories=' + encodeURIComponent(d.p373) : ''}"
           target="_blank">
          Commons'ta yükle →
        </a>
      </div>
    </div>
  `;
}

function handleFile(input) {
  const file = input.files?.[0];
  if (!file) return;
  const nameInput = document.getElementById('f-filename');
  if (nameInput && !nameInput.value) nameInput.value = file.name;
}

function showError(msg) {
  document.getElementById('content').innerHTML =
    `<div class="loading-state" style="color:#c00">${msg}</div>`;
}

loadItem();
</script>
</body>
</html>
