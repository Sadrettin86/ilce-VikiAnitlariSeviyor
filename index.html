<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viki Anıtları Seviyor – İlçe Eşleştirici</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1e2433; height: 100vh; display: flex; flex-direction: column; }

  #header { background: #ffffff; border-bottom: 1px solid #dde1ea; padding: 10px 20px; display: flex; align-items: center; gap: 14px; flex-shrink: 0; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  #header h1 { font-size: 15px; font-weight: 700; color: #5b21b6; white-space: nowrap; }
  #search-box { flex: 1; background: #f5f6fa; border: 1px solid #dde1ea; border-radius: 8px; padding: 7px 12px; color: #1e2433; font-size: 13px; max-width: 300px; outline: none; transition: border-color .15s; }
  #search-box:focus { border-color: #7c3aed; }
  #search-box::placeholder { color: #9ca3af; }
  #stats { font-size: 12px; color: #6b7280; white-space: nowrap; margin-left: auto; }
  #stats b { color: #059669; }

  #main { display: flex; flex: 1; overflow: hidden; }
  #map { flex: 1; }

  #sidebar { width: 370px; background: #ffffff; border-left: 1px solid #dde1ea; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
  #sidebar-top { padding: 10px 14px; border-bottom: 1px solid #eef0f5; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; background: #fafbfd; }
  #list-label { font-size: 11px; color: #9ca3af; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; }
  #filter-btns { display: flex; gap: 5px; }
  .fbtn { background: #f0f2f5; border: 1px solid #dde1ea; color: #6b7280; padding: 3px 9px; border-radius: 20px; font-size: 11px; cursor: pointer; transition: all .15s; }
  .fbtn.on { background: #ede9fe; border-color: #7c3aed; color: #5b21b6; font-weight: 600; }
  .fbtn:hover:not(.on) { border-color: #a78bfa; color: #5b21b6; }

  #district-list { flex: 1; overflow-y: auto; }
  #district-list::-webkit-scrollbar { width: 5px; }
  #district-list::-webkit-scrollbar-track { background: #f5f6fa; }
  #district-list::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

  .ditem { padding: 9px 14px; border-bottom: 1px solid #f0f2f5; cursor: pointer; transition: background .1s; }
  .ditem:hover { background: #f5f3ff; }
  .ditem.active { background: #ede9fe; border-left: 3px solid #7c3aed; padding-left: 11px; }
  .dname { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px; color: #1e2433; }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-g { background: #059669; }
  .dot-y { background: #d97706; }
  .dot-x { background: #d1d5db; }
  .dmeta { font-size: 11px; color: #9ca3af; margin-top: 2px; padding-left: 14px; }

  #detail { background: #fafbfd; border-top: 2px solid #ede9fe; padding: 14px; flex-shrink: 0; max-height: 300px; overflow-y: auto; display: none; }
  #detail-title { font-size: 15px; font-weight: 700; color: #5b21b6; margin-bottom: 12px; }
  .mlabel { font-size: 10px; color: #9ca3af; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 6px; font-weight: 600; }

  .cur-match { display: flex; align-items: center; gap: 8px; background: #ecfdf5; border: 1px solid #6ee7b7; border-radius: 8px; padding: 8px 12px; }
  .cur-qid { font-size: 13px; font-weight: 700; color: #059669; }
  .cur-lbl { font-size: 12px; color: #6b7280; flex: 1; }
  .xbtn { background: none; border: none; color: #d1d5db; cursor: pointer; font-size: 17px; line-height: 1; padding: 2px 4px; border-radius: 4px; transition: color .15s; }
  .xbtn:hover { color: #ef4444; }

  .sug { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 8px 12px; cursor: pointer; display: flex; gap: 10px; align-items: flex-start; transition: all .15s; margin-bottom: 5px; }
  .sug:hover { border-color: #7c3aed; background: #f5f3ff; }
  .sug-qid { font-size: 11px; color: #7c3aed; font-weight: 700; white-space: nowrap; padding-top: 1px; }
  .sug-name { font-size: 12px; color: #1e2433; font-weight: 500; }
  .sug-desc { font-size: 11px; color: #9ca3af; overflow: hidden; text-overflow: ellipsis; max-width: 260px; white-space: nowrap; }
  .info-txt { font-size: 12px; color: #9ca3af; padding: 10px 0; text-align: center; }

  #commons-box { margin-top: 10px; padding: 9px 12px; border-radius: 8px; font-size: 12px; line-height: 1.5; }
  #commons-box.ok { background: #ecfdf5; border: 1px solid #6ee7b7; color: #065f46; }
  #commons-box.no { background: #f9fafb; border: 1px solid #e5e7eb; color: #9ca3af; }
  #commons-box a { color: #2563eb; text-decoration: none; }
  #commons-box a:hover { text-decoration: underline; }

  #overlay { position: fixed; inset: 0; background: rgba(240,242,245,.88); display: flex; align-items: center; justify-content: center; z-index: 9000; }
  #overlay.hidden { display: none; }
  .spin { width: 36px; height: 36px; border: 3px solid #dde1ea; border-top-color: #7c3aed; border-radius: 50%; animation: sp .7s linear infinite; }
  .spin-lbl { color: #6b7280; font-size: 13px; margin-top: 12px; text-align: center; }
  @keyframes sp { to { transform: rotate(360deg); } }

  .leaflet-tooltip { background: #fff; border: 1px solid #dde1ea; color: #1e2433; font-size: 12px; padding: 4px 8px; box-shadow: 0 2px 6px rgba(0,0,0,.1); border-radius: 6px; }
  .leaflet-tooltip-pane .leaflet-tooltip::before { display: none; }
</style>
</head>
<body>

<div id="header">
  <h1>🏛️ Viki Anıtları Seviyor – İlçe Eşleştirici</h1>
  <input id="search-box" type="text" placeholder="İlçe ara (eşleştirilen)..." oninput="onSearch(this.value)">
  <div id="stats">Eşleşti: <b id="s-matched">0</b> / <b id="s-total">0</b> &nbsp;|&nbsp; 🟢 Binalar: <b id="s-bldg">0</b></div>
</div>

<div id="main">
  <div id="map"></div>
  <div id="sidebar">
    <div id="sidebar-top">
      <span id="list-label">–</span>
      <div id="filter-btns">
        <button class="fbtn on" onclick="setFilter('all',this)">Tümü</button>
        <button class="fbtn" onclick="setFilter('matched',this)">Eşleşti</button>
        <button class="fbtn" onclick="setFilter('buildings',this)">🟢 Binalar</button>
        <button class="fbtn" onclick="setFilter('unmatched',this)">Bekliyor</button>
      </div>
    </div>
    <div id="district-list"></div>
    <div id="detail">
      <div id="detail-title"></div>
      <div class="mlabel">Wikidata Eşleştirmesi</div>
      <div id="match-area"></div>
      <div id="commons-box" style="display:none"></div>
    </div>
  </div>
</div>

<div id="overlay">
  <div style="text-align:center">
    <div class="spin"></div>
    <div class="spin-lbl" id="overlay-lbl">İlçe sınırları yükleniyor...</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ================================================================
// 🔧 FIREBASE KONFİGÜRASYON — kendi değerlerinle değiştir
// ================================================================
const firebaseConfig = {
  apiKey: "AIzaSyCdOtnD9RJRS6sUoUnRDezReMxdBVaud0Q",
  authDomain: "ilce-vikianitlari.firebaseapp.com",
  projectId: "ilce-vikianitlari",
  storageBucket: "ilce-vikianitlari.firebasestorage.app",
  messagingSenderId: "918748034657",
  appId: "1:918748034657:web:0648dd55812bc193c71c20"
};
// ================================================================

const GEOJSON_URL = "https://raw.githubusercontent.com/Sadrettin86/ilce-VikiAnitlariSeviyor/main/districts.geojson";

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

let features   = [];
let matches    = {};
let activeIdx  = null;
let filter     = 'all';
let searchQ    = '';
let polyLayers = [];

// MAP — açık harita tile
const map = L.map('map').setView([39, 35], 6);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO', maxZoom: 19
}).addTo(map);

// ================================================================
// INIT
// ================================================================
async function init() {
  setOverlay('İlçe sınırları yükleniyor...');
  const resp = await fetch(GEOJSON_URL);
  if (!resp.ok) throw new Error('GeoJSON yüklenemedi: ' + resp.status);
  const geojson = await resp.json();
  features = geojson.features;

  setOverlay('Eşleştirmeler yükleniyor...');
  await loadMatches();

  renderMap();
  renderList();
  updateStats();
  hideOverlay();
}

// ================================================================
// FIREBASE
// ================================================================
async function loadMatches() {
  const snap = await getDocs(collection(db, 'matches'));
  matches = {};
  snap.docs.forEach(d => { const data = d.data(); if (data.qid) matches[d.id] = data; });
}
async function saveMatch(idx, data) {
  await setDoc(doc(db, 'matches', String(idx)), data);
  matches[String(idx)] = data;
}
async function deleteMatch(idx) {
  await setDoc(doc(db, 'matches', String(idx)), { deleted: true });
  delete matches[String(idx)];
}

// ================================================================
// HARİTA — sadece polygon, marker yok
// ================================================================
function getStyle(idx) {
  const m = matches[String(idx)];
  if (!m)             return { color: '#94a3b8', weight: 1.2, fillColor: '#94a3b8', fillOpacity: 0.08, opacity: 0.6 };
  if (m.hasBuildings) return { color: '#059669', weight: 1.5, fillColor: '#059669', fillOpacity: 0.20, opacity: 0.9 };
  return               { color: '#d97706', weight: 1.5, fillColor: '#d97706', fillOpacity: 0.18, opacity: 0.9 };
}

function renderMap() {
  polyLayers.forEach(l => { if (l) map.removeLayer(l); });
  polyLayers = [];

  features.forEach((feature, idx) => {
    const layer = L.geoJSON(feature, { style: getStyle(idx) });
    layer.on('click', () => selectDistrict(idx));
    layer.on('mouseover', () => { if (activeIdx !== idx) layer.setStyle({ fillOpacity: getStyle(idx).fillOpacity + 0.12, weight: 2 }); });
    layer.on('mouseout',  () => { if (activeIdx !== idx) layer.setStyle(getStyle(idx)); });
    const m = matches[String(idx)];
    if (m?.label) layer.bindTooltip(m.label, { sticky: true });
    layer.addTo(map);
    polyLayers[idx] = layer;
  });
}

function refreshLayer(idx) {
  const layer = polyLayers[idx];
  if (!layer) return;
  layer.setStyle(getStyle(idx));
  layer.unbindTooltip();
  const m = matches[String(idx)];
  if (m?.label) layer.bindTooltip(m.label, { sticky: true });
}

// ================================================================
// LİSTE
// ================================================================
function getFiltered() {
  let list = features.map((f, i) => ({ idx: i, match: matches[String(i)] }));
  if (searchQ) {
    const q = searchQ.toLowerCase();
    list = list.filter(d => (d.match?.label || '').toLowerCase().includes(q));
  }
  if (filter === 'matched')        list = list.filter(d => d.match?.qid);
  else if (filter === 'buildings') list = list.filter(d => d.match?.hasBuildings);
  else if (filter === 'unmatched') list = list.filter(d => !d.match?.qid);
  list.sort((a, b) => {
    if (a.match?.label && b.match?.label) return a.match.label.localeCompare(b.match.label, 'tr');
    if (a.match?.label) return -1;
    if (b.match?.label) return 1;
    return a.idx - b.idx;
  });
  return list;
}

function renderList() {
  const filtered = getFiltered();
  document.getElementById('list-label').textContent = `${filtered.length} ilçe`;
  document.getElementById('district-list').innerHTML = filtered.map(({ idx, match }) => {
    const name   = match?.label || `İlçe #${idx + 1}`;
    const dotCls = match?.hasBuildings ? 'dot-g' : match?.qid ? 'dot-y' : 'dot-x';
    const meta   = match?.qid ? match.qid : 'Eşleştirilmedi';
    return `<div class="ditem${activeIdx === idx ? ' active' : ''}" onclick="window._sel(${idx})">
      <div class="dname"><span class="dot ${dotCls}"></span>${name}</div>
      <div class="dmeta">${meta}</div>
    </div>`;
  }).join('');
}

window._sel      = (idx) => selectDistrict(idx);
window.onSearch  = (v)   => { searchQ = v; renderList(); };
window.setFilter = (f, btn) => {
  filter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderList();
};

// ================================================================
// SEÇİM
// ================================================================
async function selectDistrict(idx) {
  // Önceki aktif layer stilini sıfırla
  if (activeIdx !== null && polyLayers[activeIdx]) polyLayers[activeIdx].setStyle(getStyle(activeIdx));

  activeIdx = idx;
  renderList();

  // Aktif layer'ı vurgula
  if (polyLayers[idx]) {
    const s = getStyle(idx);
    polyLayers[idx].setStyle({ ...s, weight: 2.5, fillOpacity: s.fillOpacity + 0.15 });
    try { map.fitBounds(polyLayers[idx].getBounds(), { maxZoom: 12, padding: [40, 40] }); } catch(e) {}
  }

  const panel = document.getElementById('detail');
  panel.style.display = 'block';
  const m    = matches[String(idx)];
  const name = m?.label || `İlçe #${idx + 1}`;
  document.getElementById('detail-title').textContent = `📍 ${name}`;
  document.getElementById('commons-box').style.display = 'none';

  if (m?.qid) { showCurrentMatch(idx, m); showCommonsBox(m); }
  else { await showSuggestions(idx); }

  setTimeout(() => { const el = document.querySelector('.ditem.active'); if (el) el.scrollIntoView({ block: 'nearest' }); }, 50);
}

// ================================================================
// WIKIDATA ARAMA
// ================================================================
async function showSuggestions(idx) {
  document.getElementById('match-area').innerHTML = `
    <div style="display:flex;gap:6px;margin-bottom:8px">
      <input id="wd-search"
        style="flex:1;background:#fff;border:1px solid #dde1ea;border-radius:6px;padding:6px 10px;color:#1e2433;font-size:12px;outline:none"
        placeholder="İlçe adını yaz, Enter'a bas..."
        onkeydown="if(event.key==='Enter')window._wdSearch(${idx})">
      <button onclick="window._wdSearch(${idx})"
        style="background:#7c3aed;border:none;color:white;padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:600">Ara</button>
    </div>
    <div id="sugs"></div>`;
  document.getElementById('wd-search').focus();
}

window._wdSearch = async function(idx) {
  const q = document.getElementById('wd-search')?.value?.trim();
  if (!q) return;
  document.getElementById('sugs').innerHTML = `<div class="info-txt">Aranıyor...</div>`;
  try {
    const url  = `https://www.wikidata.org/w/api.php?action=wbsearchentities&search=${encodeURIComponent(q)}&language=tr&uselang=tr&type=item&limit=7&format=json&origin=*`;
    const data = await (await fetch(url)).json();
    const res  = data.search || [];
    if (!res.length) { document.getElementById('sugs').innerHTML = `<div class="info-txt">Sonuç bulunamadı.</div>`; return; }
    document.getElementById('sugs').innerHTML = res.map(r => `
      <div class="sug" onclick="window._apply(${idx},'${r.id}',${JSON.stringify(r.label || r.id)})">
        <div class="sug-qid">${r.id}</div>
        <div>
          <div class="sug-name">${r.label || r.id}</div>
          <div class="sug-desc">${r.description || ''}</div>
        </div>
      </div>`).join('');
  } catch(e) {
    document.getElementById('sugs').innerHTML = `<div class="info-txt">Hata: ${e.message}</div>`;
  }
};

// ================================================================
// EŞLEŞTİRME UYGULA
// ================================================================
window._apply = async function(idx, qid, label) {
  document.getElementById('match-area').innerHTML = `<div class="info-txt">⏳ Commons kontrol ediliyor...</div>`;
  document.getElementById('commons-box').style.display = 'none';

  const { commonsCategory, hasBuildings, buildingsCat } = await checkCommons(qid);
  const data = { qid, label, commonsCategory: commonsCategory || '', hasBuildings: !!hasBuildings, buildingsCat: buildingsCat || '', updatedAt: new Date().toISOString() };

  await saveMatch(idx, data);
  document.getElementById('detail-title').textContent = `📍 ${label}`;
  showCurrentMatch(idx, data);
  showCommonsBox(data);
  refreshLayer(idx);
  // Aktif stil tekrar uygula
  if (polyLayers[idx]) {
    const s = getStyle(idx);
    polyLayers[idx].setStyle({ ...s, weight: 2.5, fillOpacity: s.fillOpacity + 0.15 });
  }
  renderList();
  updateStats();
};

function showCurrentMatch(idx, m) {
  document.getElementById('match-area').innerHTML = `
    <div class="cur-match">
      <div>
        <div class="cur-qid">${m.qid}</div>
        <div class="cur-lbl">${m.label || ''}</div>
      </div>
      <button class="xbtn" onclick="window._remove(${idx})" title="Eşleştirmeyi sil">✕</button>
    </div>`;
}

// ================================================================
// EŞLEŞTİRME SİL
// ================================================================
window._remove = async function(idx) {
  await deleteMatch(idx);
  document.getElementById('commons-box').style.display = 'none';
  document.getElementById('detail-title').textContent = `📍 İlçe #${idx + 1}`;
  refreshLayer(idx);
  renderList();
  updateStats();
  await showSuggestions(idx);
};

// ================================================================
// COMMONS P373
// ================================================================
async function checkCommons(qid) {
  try {
    const wdData = await (await fetch(`https://www.wikidata.org/wiki/Special:EntityData/${qid}.json`)).json();
    const entity = wdData.entities[qid];
    const p373   = entity?.claims?.P373?.[0]?.mainsnak?.datavalue?.value;
    if (!p373) return {};
    const buildingsCat = `Buildings in ${p373}`;
    const cmData = await (await fetch(`https://commons.wikimedia.org/w/api.php?action=query&titles=Category:${encodeURIComponent(buildingsCat)}&format=json&origin=*`)).json();
    const pages  = cmData.query?.pages || {};
    const exists = !Object.keys(pages).some(k => k === '-1');
    return { commonsCategory: p373, hasBuildings: exists, buildingsCat: exists ? buildingsCat : null };
  } catch(e) { return {}; }
}

function showCommonsBox(m) {
  const box = document.getElementById('commons-box');
  box.style.display = 'block';
  if (!m.commonsCategory) {
    box.className = 'no'; box.innerHTML = '📁 Wikidata\'da P373 değeri yok';
  } else if (m.hasBuildings) {
    const url = `https://commons.wikimedia.org/wiki/Category:${encodeURIComponent(m.buildingsCat)}`;
    box.className = 'ok'; box.innerHTML = `✅ <a href="${url}" target="_blank">Category:${m.buildingsCat}</a>`;
  } else {
    box.className = 'no'; box.innerHTML = `❌ "Buildings in ${m.commonsCategory}" kategorisi yok`;
  }
}

// ================================================================
// STATS
// ================================================================
function updateStats() {
  document.getElementById('s-total').textContent   = features.length;
  document.getElementById('s-matched').textContent = Object.keys(matches).length;
  document.getElementById('s-bldg').textContent    = Object.values(matches).filter(m => m.hasBuildings).length;
}

function setOverlay(txt) { document.getElementById('overlay').classList.remove('hidden'); document.getElementById('overlay-lbl').textContent = txt; }
function hideOverlay()    { document.getElementById('overlay').classList.add('hidden'); }

init().catch(e => { hideOverlay(); alert('Yükleme hatası: ' + e.message); });
</script>
</body>
</html>
