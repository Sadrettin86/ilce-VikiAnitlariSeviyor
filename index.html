<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viki Anıtları Seviyor – İlçe Eşleştirici</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="stylesheet" href="css/style.css"/>
<link rel="stylesheet" href="css/desktop.css"/>
<link rel="stylesheet" href="css/mobile.css"/>
</head>
<body>

<div id="header">
  <h1><span class="logo-green">🏛️</span> Viki Anıtları Seviyor – İlçe Eşleştirici</h1>
</div>

<div id="main">

  <!-- SIDEBAR — sol, sadece ilçe seçilince görünür -->
  <div id="sidebar">
    <div id="sidebar-top">
      <div id="sidebar-title">–</div>
      <div id="filter-btns">
        <button class="fbtn on" data-f="all"      onclick="window.setItemFilter('all',this)">Tümü</button>
        <button class="fbtn"    data-f="image"    onclick="window.setItemFilter('image',this)">📷 Var</button>
        <button class="fbtn"    data-f="noimage"  onclick="window.setItemFilter('noimage',this)">📷 Yok</button>
        <button class="fbtn"    data-f="category" onclick="window.setItemFilter('category',this)">📁 Var</button>
        <button class="fbtn"    data-f="nocat"    onclick="window.setItemFilter('nocat',this)">📁 Yok</button>
      </div>
      <div id="item-count"></div>
    </div>
    <div id="item-list"></div>
  </div>

  <div id="map"></div>

</div>

<!-- Harita kontrolleri -->
<div id="map-controls">
  <div class="map-btn-group">
    <button id="btn-zoom-in"  class="map-btn" onclick="window.zoomIn()"  title="Yakınlaş">+</button>
    <button id="btn-zoom-out" class="map-btn" onclick="window.zoomOut()" title="Uzaklaş">−</button>
  </div>
  <div class="map-btn-group">
    <button id="btn-locate" class="map-btn" onclick="window.toggleLocate()" title="Konumumu göster">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
      </svg>
    </button>
    <button id="btn-layers" class="map-btn" onclick="window.toggleLayer()" title="Katmanı değiştir">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 22 8.5 12 15 2 8.5"/><polyline points="2 15.5 12 22 22 15.5"/>
      </svg>
    </button>
  </div>
</div>

<div id="overlay">
  <div style="text-align:center">
    <div class="spin"></div>
    <div class="spin-lbl" id="overlay-lbl">Yükleniyor...</div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
