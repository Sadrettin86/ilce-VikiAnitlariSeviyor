<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viki Anıtları Seviyor – İlçe Eşleştirici</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="stylesheet" href="css/style.css"/>
<link rel="stylesheet" href="css/desktop.css"/>
<link rel="stylesheet" href="css/mobile.css"/>
</head>
<body>

<div id="header">
  <h1>🏛️ Viki Anıtları Seviyor – İlçe Eşleştirici</h1>
  <input id="search-box" type="text" placeholder="İlçe ara (eşleştirilen)..." oninput="onSearch(this.value)">
  <div id="stats">Eşleşti: <b id="s-matched">0</b> / <b id="s-total">0</b> &nbsp;|&nbsp; 🟢 Binalar: <b id="s-bldg">0</b></div>
</div>

<div id="map-controls">
  <button id="btn-zoom-in"  class="map-btn" onclick="window.zoomIn()"      title="Yakınlaş">+</button>
  <button id="btn-zoom-out" class="map-btn" onclick="window.zoomOut()"     title="Uzaklaş">−</button>
  <div class="map-btn-divider"></div>
  <button id="btn-locate"   class="map-btn" onclick="window.toggleLocate()" title="Konumumu göster">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
      <circle cx="12" cy="12" r="8" stroke-dasharray="2 2" opacity=".4"/>
    </svg>
  </button>
  <button id="btn-layers"   class="map-btn" onclick="window.toggleLayer()"  title="Katmanı değiştir">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12 2 22 8.5 12 15 2 8.5"/><polyline points="2 15.5 12 22 22 15.5"/><polyline points="2 12 12 18.5 22 12"/>
    </svg>
  </button>
</div>

<div id="main">
  <div id="map"></div>
  <div id="sidebar">
    <div id="sidebar-top">
      <span id="list-label">–</span>
      <div id="filter-btns">
        <button class="fbtn on" onclick="setFilter('all',this)">Tümü</button>
        <button class="fbtn" onclick="setFilter('matched',this)">Eşleşti</button>
        <button class="fbtn" onclick="setFilter('buildings',this)">🟢 Binalar</button>
        <button class="fbtn" onclick="setFilter('unmatched',this)">Bekliyor</button>
      </div>
    </div>
    <div id="district-list"></div>
    <div id="detail">
      <div id="detail-title"></div>
      <div class="mlabel">Wikidata Eşleştirmesi</div>
      <div id="match-area"></div>
      <div id="commons-box" style="display:none"></div>
    </div>
  </div>
</div>

<div id="overlay">
  <div style="text-align:center">
    <div class="spin"></div>
    <div class="spin-lbl" id="overlay-lbl">Yükleniyor...</div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
